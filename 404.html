<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found | SRT Digital Solutions</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="icon" type="image/png" sizes="48x48" href="./img/favicon-48.png" />
  <link rel="shortcut icon" href="/favicon.ico" />

  <style>
    :root {
      --theme: #25bbcc;
      --theme-dark: #1a8a99;
      --bg-primary: #0a1a2e;
      --bg-secondary: #0d2030;
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.7);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, #0f2a3d 100%);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Animated background elements */
    .bg-shapes {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .bg-shapes .shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.08;
      animation: float 20s ease-in-out infinite;
    }

    .bg-shapes .shape:nth-child(1) {
      width: 400px;
      height: 400px;
      background: var(--theme);
      top: -100px;
      right: -100px;
      animation-delay: 0s;
    }

    .bg-shapes .shape:nth-child(2) {
      width: 300px;
      height: 300px;
      background: var(--theme-dark);
      bottom: -80px;
      left: -80px;
      animation-delay: -5s;
    }

    .bg-shapes .shape:nth-child(3) {
      width: 200px;
      height: 200px;
      background: linear-gradient(135deg, var(--theme), var(--theme-dark));
      top: 50%;
      left: 20%;
      animation-delay: -10s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -30px) scale(1.05); }
      50% { transform: translate(-20px, 20px) scale(0.95); }
      75% { transform: translate(20px, 10px) scale(1.02); }
    }

    /* Grid pattern overlay */
    .grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(37, 187, 204, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37, 187, 204, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 1;
    }

    /* Main container */
    .error-container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 40px 24px;
      max-width: 600px;
    }

    /* Glowing 404 */
    .error-code {
      font-size: clamp(100px, 20vw, 180px);
      font-weight: 700;
      line-height: 1;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--theme) 0%, #3af8ff 50%, var(--theme) 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease infinite;
      text-shadow: none;
      position: relative;
    }

    .error-code::after {
      content: '404';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: inherit;
      font-weight: inherit;
      background: linear-gradient(135deg, var(--theme) 0%, #3af8ff 50%, var(--theme) 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: blur(30px);
      opacity: 0.5;
      animation: gradientShift 4s ease infinite;
      z-index: -1;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* Icon */
    .error-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 30px;
      background: rgba(37, 187, 204, 0.1);
      border: 1px solid rgba(37, 187, 204, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s ease-in-out infinite;
    }

    .error-icon svg {
      width: 36px;
      height: 36px;
      color: var(--theme);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 187, 204, 0.3); }
      50% { transform: scale(1.05); box-shadow: 0 0 30px 10px rgba(37, 187, 204, 0.1); }
    }

    .error-title {
      font-size: clamp(24px, 4vw, 32px);
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text-primary);
    }

    .error-message {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 40px;
      max-width: 450px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Buttons */
    .error-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .btn-primary {
      background: linear-gradient(90deg, #00e1e2 0%, #00fffe 25%, #3af8ff 50%, #00fffe 75%, #00e1e2 100%);
      background-size: 200% 200%;
      animation: gradientShift 4s ease infinite;
      color: var(--bg-primary);
      border: none;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(37, 187, 204, 0.4);
    }

    .btn-secondary {
      background: rgba(37, 187, 204, 0.1);
      border: 1px solid rgba(37, 187, 204, 0.3);
      color: var(--theme);
    }

    .btn-secondary:hover {
      background: rgba(37, 187, 204, 0.2);
      border-color: var(--theme);
      transform: translateY(-3px);
    }

    .btn svg {
      width: 18px;
      height: 18px;
    }

    /* Helpful links */
    .helpful-links {
      margin-top: 60px;
      padding-top: 40px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .helpful-links h3 {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }

    .links-grid {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links-grid a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .links-grid a:hover {
      color: var(--theme);
    }

    .links-grid a svg {
      width: 14px;
      height: 14px;
    }

    /* Logo */
    .logo {
      position: absolute;
      top: 30px;
      left: 30px;
      z-index: 20;
    }

    .logo img {
      height: 36px;
      width: auto;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .error-container {
        padding: 30px 20px;
      }

      .error-icon {
        width: 60px;
        height: 60px;
        margin-bottom: 20px;
      }

      .error-icon svg {
        width: 28px;
        height: 28px;
      }

      .error-actions {
        flex-direction: column;
        align-items: center;
      }

      .btn {
        width: 100%;
        max-width: 280px;
        justify-content: center;
      }

      .helpful-links {
        margin-top: 40px;
        padding-top: 30px;
      }

      .links-grid {
        flex-direction: column;
        gap: 14px;
      }

      .logo {
        top: 20px;
        left: 20px;
      }

      .logo img {
        height: 30px;
      }
    }
  </style>
</head>
